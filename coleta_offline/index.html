<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta Offline Checklist</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- SheetJS for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>📝 Coleta Offline</h1>
            <span id="status-indicator" class="status online">Online</span>
        </header>

        <main>
            <form id="checklist-form">
                <div class="form-group">
                    <label for="data">Data</label>
                    <input type="date" id="data" required>
                </div>

                <div class="form-group">
                    <label for="piso">Piso</label>
                    <select id="piso" required>
                        <option value="">Selecione...</option>
                        <option value="Piso 3">Piso 3</option>
                        <option value="Piso 4">Piso 4</option>
                        <option value="Piso 5">Piso 5</option>
                        <option value="Piso 6">Piso 6</option>
                        <option value="Niterói">Niterói</option>
                        <option value="UBT 4">UBT 4</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="posicao">Posição</label>
                        <input type="text" id="posicao" placeholder="Ex: 6408" required list="historico-posicoes">
                        <datalist id="historico-posicoes"></datalist>
                    </div>
                    
                    <div class="form-group half">
                        <label for="modulo">Módulo</label>
                        <select id="modulo">
                            <option value="">Selecione...</option>
                            <!-- Script will populate 1-36 -->
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="observacao">Observação</label>
                    <textarea id="observacao" placeholder="Digite a observação..." required list="historico-observacoes"></textarea>
                    <datalist id="historico-observacoes"></datalist>
                </div>

                <button type="submit" class="btn-primary">Adicionar à Prévia</button>
            </form>

            <section class="preview-section">
                <h2>📋 Pré-visualização dos Dados</h2>
                <div class="table-container">
                    <table id="preview-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Piso</th>
                                <th>Posição</th>
                                <th>Módulo</th>
                                <th>Observação</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <div class="action-buttons">
                <button id="btn-clear" class="btn-danger">Limpar Tudo</button>
                <button id="btn-export" class="btn-success">Baixar Excel</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registrado!', reg))
                    .catch(err => console.error('Falha no registro do Service Worker', err));
            });
        }
    </script>
</body>
</html>
